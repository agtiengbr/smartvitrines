name: Módulo PrestaShop — ZIP

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '!README.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ler versão do módulo
        id: ver
        run: |
          VERSION="$(grep -o '<version><!\[CDATA\[[^]]*' config.xml | sed -E 's/.*\[CDATA\[//')"
          if [ -z "$VERSION" ]; then echo "versão não encontrada" >&2; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=module-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Gerar ZIP
        run: bash scripts/build-module-zip.sh

      - name: Publicar artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartvitrines-${{ steps.ver.outputs.version }}
          path: dist/smartvitrines-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

      - name: Release quando a versão muda (push na main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG já existe — versão não mudou."
            exit 0
          fi
          gh release create "$TAG" \
            "dist/smartvitrines-${{ steps.ver.outputs.version }}.zip" \
            --title "Módulo SmartVitrines ${{ steps.ver.outputs.version }}" \
            --notes "ZIP do módulo PrestaShop SmartVitrines versão ${{ steps.ver.outputs.version }}."
